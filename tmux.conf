# Prefix: Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane swap (directional, follow content)
bind H select-pane -L \; swap-pane -d -s '!'
bind J select-pane -D \; swap-pane -d -s '!'
bind K select-pane -U \; swap-pane -d -s '!'
bind L select-pane -R \; swap-pane -d -s '!'

# Splits (vim-style)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Pane resizing
bind -r < resize-pane -L 1
bind -r > resize-pane -R 1
bind -r - resize-pane -D 1
bind -r + resize-pane -U 1

# Reload
bind C-, source-file ~/.tmux.conf \; display "Reloaded!"

# True color and hyperlink support
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-ghostty:RGB"
set -ga terminal-features ",*:hyperlinks"

# Extended keys (forward Shift+Enter etc. to apps inside tmux)
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'

# allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#T"

# Mouse support
set -g mouse on

# Start index at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Window always start from home
bind c new-window -c "$HOME"

# shift window
bind -r S-Left swap-window -t -1 \; previous-window
bind -r S-Right swap-window -t +1 \; next-window

# moving to window
bind -r Left previous-window
bind -r Right next-window

# moving between sessions (repeatable)
bind -r ( switch-client -p
bind -r ) switch-client -n

# Vi copy mode
setw -g mode-keys vi
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Equalize panes (= was choose-buffer, moved to b)
bind = select-layout tiled
bind b choose-buffer

# Allow passthrough for hyperlinks and other escape sequences
set -g allow-passthrough on

# Faster escape time (no delay for nvim)
set -sg escape-time 0


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

set -g @plugin 'christoomey/vim-tmux-navigator'

# TMUX Powerkit
set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @powerkit_status_position 'bottom'

# Style
set -g @powerkit_theme "moonlight"
set -g @powerkit_theme_variant "default"

set -g @powerkit_separator_style "normal"
set -g @powerkit_edge_separator_style "normal"
set -g @powerkit_icon_padding "2"
set -g @powerkit_plugins "hostname,git"




# Resurrect TMUX
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


